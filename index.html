<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SANSKARDHAM VISION</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body { font-family: 'Poppins', sans-serif; }
.card { border-radius:20px; box-shadow:0 6px 15px rgba(0,0,0,0.1);}
.toast {
 position: fixed;
 bottom:20px;
 left:50%;
 transform:translateX(-50%);
 background:#111;
 color:#fff;
 padding:10px 20px;
 border-radius:12px;
 display:none;
}
</style>
</head>

<body class="bg-gray-100">

<!-- LOGIN -->
<div id="loginPage" class="h-screen flex items-center justify-center bg-white">
 <div class="text-center">
  <div class="text-5xl mb-4">🏥</div>
  <h1 class="text-2xl font-bold italic uppercase text-blue-600 mb-6">
   SANSKARDHAM VISION
  </h1>

  <input id="uid" placeholder="User ID" class="border p-2 rounded-xl w-64 mb-3"><br>
  <input id="pass" type="password" placeholder="Password" class="border p-2 rounded-xl w-64 mb-4"><br>

  <button onclick="login()" class="bg-blue-600 text-white px-6 py-2 rounded-xl">Login</button>
 </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

 <!-- HEADER -->
 <div class="bg-gradient-to-r from-blue-700 to-blue-500 text-white p-5 rounded-b-[40px] shadow-lg">
  
  <div class="flex justify-between items-center">
    <h1 class="text-2xl font-bold">SANSKARDHAM</h1>

    <button onclick="toggleShift()" id="shiftBtn"
      class="bg-white/20 px-4 py-2 rounded-full">
      🌞 Day
    </button>
  </div>

  <div class="mt-2 text-sm" id="userText"></div>

  <div class="mt-4 bg-white/20 p-3 rounded-2xl">
    <input type="date" id="date" class="bg-transparent text-white outline-none w-full">
  </div>

 </div>

 <!-- SEARCH -->
 <div class="p-4">
  <div class="bg-white p-3 rounded-2xl shadow flex gap-2">
    <input id="promptBox" placeholder="મારી ડ્યુટી ક્યાં છે?" class="flex-1 outline-none">
    <button onclick="searchDuty()">🔍</button>
  </div>
 </div>

 <!-- DEPARTMENTS -->
 <div class="px-4">
  <h2 class="text-gray-400 font-bold mb-3">DEPARTMENTS</h2>
  <div id="grid" class="grid grid-cols-2 gap-4"></div>
 </div>

 <!-- DOWNLOAD -->
 <button onclick="downloadDuty()" class="m-4 bg-green-500 text-white w-full py-2 rounded-xl">
  Download Duty PNG
 </button>

 <!-- NOTICE BOARD -->
 <div class="p-4">
  <div class="bg-white p-3 rounded-2xl shadow">
   <h2 class="font-bold mb-2">Notice Board</h2>
   <div id="msgs" class="space-y-2 mb-3"></div>

   <div id="noticeInput" class="flex gap-2">
    <input id="msg" class="flex-1 border p-2 rounded-xl" placeholder="Message">
    <button onclick="sendMsg()" class="bg-blue-600 text-white px-3 rounded-xl">Send</button>
   </div>
  </div>
 </div>

</div>

<div id="toast" class="toast"></div>

<script>

// Firebase
firebase.initializeApp({
 databaseURL:"https://jatin-9a897-default-rtdb.firebaseio.com/"
});
const db=firebase.database();

let role="",shift="day";
const depts=["OPD","OFF LIST","EMERGENCY","DAYCARE","ICU","WARD"];

// TOAST
function toast(t){
 let el=document.getElementById("toast");
 el.innerText=t;
 el.style.display="block";
 setTimeout(()=>el.style.display="none",2000);
}

// LOGIN
function login(){
 let u=uid.value,p=pass.value;

 if(u==="ssgd" && p==="9099020925"){role="admin";}
 else if(u==="ssgd" && p==="9712284024"){role="staff";}
 else {toast("Invalid Login"); return;}

 loginPage.style.display="none";
 app.style.display="block";

 userText.innerText = role==="admin" ? "👤 Admin" : "👤 Staff";

 date.value=new Date().toISOString().split('T')[0];

 render();
 loadMsgs();
}

// SHIFT
function toggleShift(){
 shift = shift==="day" ? "night":"day";
 shiftBtn.innerText = shift==="day" ? "🌞 Day":"🌙 Night";
}

// RENDER
function render(){
 grid.innerHTML="";

 depts.forEach(d=>{
  let card=document.createElement("div");
  card.className="card bg-white p-5 text-center cursor-pointer";

  card.innerHTML=`
   <div class="text-4xl mb-2">🏥</div>
   <div class="font-bold">${d}</div>
  `;

  card.onclick=()=>openDept(d);

  grid.appendChild(card);
 });
}

// OPEN DEPT
function openDept(d){
 let slots="";

 for(let i=0;i<10;i++){
  slots+=`
   <input id="s${i}" class="w-full mb-2 p-2 border rounded-xl"
   ${role==="staff"?"disabled":""}
   placeholder="Slot ${i+1}">
  `;
 }

 let html=`
  <div class="fixed inset-0 bg-black/40 flex items-end">
   <div class="bg-white w-full p-4 rounded-t-3xl max-h-[80vh] overflow-auto">
    <h2 class="font-bold mb-3">${d}</h2>
    ${slots}
    <button onclick="closeModal()" class="bg-blue-600 text-white w-full py-2 rounded-xl mt-2">Close</button>
   </div>
  </div>
 `;

 document.body.insertAdjacentHTML("beforeend",html);

 loadDept(d);
}

// CLOSE
function closeModal(){
 document.body.lastChild.remove();
}

// LOAD DATA
function loadDept(d){
 for(let i=0;i<10;i++){
  let ref=db.ref(`hospital_v11_final/${date.value}/${shift}/${d}/${i}`);

  ref.on("value",snap=>{
   let val=snap.val()||"";
   let el=document.getElementById("s"+i);
   if(el) el.value=val;
  });

  if(role==="admin"){
   document.addEventListener("input",e=>{
    if(e.target.id==="s"+i){
     ref.set(e.target.value);
    }
   });
  }
 }
}

// SEARCH
function searchDuty(){
 let name = promptBox.value.toLowerCase();
 if(!name){ toast("Enter name"); return; }

 let found=[];

 depts.forEach(d=>{
  for(let i=0;i<10;i++){
   db.ref(`hospital_v11_final/${date.value}/${shift}/${d}/${i}`)
   .once("value",snap=>{
    let val=(snap.val()||"").toLowerCase();
    if(val.includes(name)){
     found.push(`${d} (Slot ${i+1})`);
    }

    if(d===depts[depts.length-1] && i===9){
     found.length ? toast(found.join(", ")) : toast("Not found");
    }
   });
  }
 });
}

// DOWNLOAD
function downloadDuty(){
 html2canvas(document.body).then(canvas=>{
  let a=document.createElement("a");
  a.download="duty.png";
  a.href=canvas.toDataURL();
  a.click();
 });
}

// NOTICE
function sendMsg(){
 if(role!=="admin"){ toast("Only Admin"); return; }

 let text=msg.value.trim();
 if(!text){ toast("Empty"); return; }

 db.ref("hospital_notices_v2").push({
  text:text,
  time:Date.now()
 });

 msg.value="";
}

function loadMsgs(){
 db.ref("hospital_notices_v2").on("value",snap=>{
  msgs.innerHTML="";

  snap.forEach(s=>{
   let d=s.val();

   let div=document.createElement("div");
   div.className="bg-blue-100 p-2 rounded-xl flex justify-between";

   div.innerHTML=`
    <span>${d.text}</span>
    ${role==="admin"?`<button onclick="delMsg('${s.key}')">❌</button>`:""}
   `;

   msgs.appendChild(div);
  });
 });
}

function delMsg(id){
 db.ref("hospital_notices_v2/"+id).remove();
}

</script>

</body>
</html>
