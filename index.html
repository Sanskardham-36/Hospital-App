<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanskardham Hospital | Vision v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; }
        .gradient-header { background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%); }
        .btn-active:active { transform: scale(0.95); transition: 0.1s; }
        .main-card { transition: all 0.3s ease; border: 1px solid #e2e8f0; height: 110px; }
        .modal-anim { animation: zoomIn 0.2s ease-out; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div class="max-w-md mx-auto min-h-screen flex flex-col bg-white relative shadow-2xl overflow-x-hidden">
    
    <header class="gradient-header text-white p-5 rounded-b-[35px] shadow-lg sticky top-0 z-50">
        <div class="flex justify-between items-center mb-1">
            <h1 class="text-xl font-black tracking-tighter uppercase">Sanskardham</h1>
            <div id="roleBadge" class="hidden bg-white/20 px-2 py-0.5 rounded-lg text-[9px] font-bold uppercase">Guest</div>
        </div>
        <div id="dateArea" class="hidden flex items-center bg-black/10 rounded-xl px-3 py-1.5 mt-2">
            <span class="text-xs mr-2">📅</span>
            <input type="date" id="dateInput" onchange="refreshAll()" class="bg-transparent text-white font-bold outline-none text-xs w-full">
            <button onclick="toggleShift()" id="shiftIco" class="ml-2 bg-white/20 px-2 py-1 rounded text-sm">☀️</button>
        </div>
    </header>

    <div id="loginPage" class="p-8 flex-grow flex flex-col justify-center space-y-4">
        <input type="text" id="loginID" placeholder="User ID" class="w-full p-4 rounded-2xl bg-gray-50 border border-gray-200 outline-none text-center font-bold">
        <input type="password" id="loginPass" placeholder="Password" class="w-full p-4 rounded-2xl bg-gray-50 border border-gray-200 outline-none text-center font-bold">
        <button onclick="login()" class="w-full gradient-header text-white p-4 rounded-2xl font-bold btn-active uppercase">Login</button>
    </div>

    <div id="mainMenu" class="hidden p-5 space-y-4 flex-grow">
        <div class="grid grid-cols-2 gap-3">
            <div onclick="showDutySection()" class="main-card p-4 bg-white rounded-[25px] flex flex-col items-center justify-center btn-active cursor-pointer border-blue-100 border-2 shadow-sm">
                <span class="text-3xl mb-1">📅</span>
                <span class="font-black text-slate-700 text-[10px] uppercase">Duty List</span>
            </div>
            <div onclick="showProfileSection()" class="main-card p-4 bg-white rounded-[25px] flex flex-col items-center justify-center btn-active cursor-pointer border-green-100 border-2 shadow-sm">
                <span class="text-3xl mb-1">👤</span>
                <span class="font-black text-slate-700 text-[10px] uppercase">My Profile</span>
            </div>
        </div>
    </div>

    <div id="profileSection" class="hidden p-5 space-y-5 flex-grow">
        <button onclick="backToMenu()" class="text-blue-600 font-bold text-[10px] uppercase">⬅ Back</button>
        <div class="bg-blue-50 p-6 rounded-[30px] space-y-3">
            <input type="text" id="profName" placeholder="Full Name" class="w-full p-3 rounded-xl border-none font-bold text-sm">
            <input type="text" id="profID" placeholder="Staff ID / Roll No" class="w-full p-3 rounded-xl border-none font-bold text-sm">
            <select id="profExp" class="w-full p-3 rounded-xl border-none font-bold text-sm bg-white">
                <option value="">Select Experience Dept</option>
                <option value="OPD">OPD</option>
                <option value="EMERGENCY">EMERGENCY</option>
                <option value="ORTHOPEDIC">ORTHOPEDIC</option>
                <option value="ICU">ICU</option>
            </select>
            <button onclick="saveProfile()" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold uppercase text-xs">Save Profile</button>
        </div>
    </div>

    <div id="dutySection" class="hidden p-5 space-y-4 flex-grow pb-32">
        <button onclick="backToMenu()" class="text-blue-600 font-bold text-[10px] uppercase">⬅ Back</button>
        <div class="relative">
            <input type="text" id="searchBar" onkeyup="doSearch()" placeholder="શોધો..." class="w-full p-3.5 pl-10 rounded-2xl bg-white border border-gray-100 outline-none font-bold">
            <span class="absolute left-3.5 top-3.5">🔍</span>
        </div>
        <div id="deptGrid" class="grid grid-cols-2 gap-3"></div>
    </div>

    <div id="listPage" class="hidden p-5 flex-grow pb-32">
        <button onclick="backToDuty()" class="text-blue-600 font-bold text-[10px] mb-4 uppercase">⬅ Back</button>
        <div class="text-center mb-6">
            <h2 id="lTitle" class="text-2xl font-black text-gray-800 uppercase italic"></h2>
            <p id="lSub" class="text-[9px] font-bold text-gray-400 uppercase tracking-[3px]"></p>
        </div>
        <div id="lBody" class="space-y-2.5"></div>
    </div>

    <div id="editModal" class="hidden fixed inset-0 bg-black/60 z-[200] flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white w-full rounded-[40px] p-6 shadow-2xl modal-anim max-h-[90vh] overflow-y-auto">
            <h3 id="editDeptLabel" class="font-black text-gray-800 mb-2 text-center uppercase text-sm border-b pb-1"></h3>
            
            <div id="suggestionArea" class="mb-4">
                <p class="text-[8px] font-bold text-blue-600 uppercase mb-2">Experienced Staff:</p>
                <div id="suggestionList" class="flex flex-wrap gap-2"></div>
            </div>

            <input type="text" id="staffInput" placeholder="Staff Name..." class="w-full p-4 bg-gray-100 rounded-2xl font-bold text-center text-sm mb-4">

            <div class="bg-orange-50 p-4 rounded-2xl mb-4">
                <p class="text-[9px] font-bold text-orange-600 uppercase mb-2">Assign for Multiple Days? (Optional)</p>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-[8px] font-bold text-gray-400">START DATE</label>
                        <input type="date" id="bulkStart" class="w-full p-2 rounded-lg text-xs font-bold border-none">
                    </div>
                    <div>
                        <label class="text-[8px] font-bold text-gray-400">END DATE</label>
                        <input type="date" id="bulkEnd" class="w-full p-2 rounded-lg text-xs font-bold border-none">
                    </div>
                </div>
            </div>

            <div class="flex space-x-2">
                <button onclick="closeEdit()" class="flex-1 p-4 bg-gray-100 rounded-2xl font-bold text-gray-400 text-[10px]">CANCEL</button>
                <button onclick="saveSlot()" class="flex-1 p-4 gradient-header text-white rounded-2xl font-bold text-[10px]">SAVE DUTY</button>
            </div>
        </div>
    </div>

    <footer class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/90 border-t p-3 flex justify-center z-50">
        <p class="text-blue-900 font-black text-[8px] tracking-[4px] opacity-40 uppercase">Jatin Solanki By Vision</p>
    </footer>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://jatin-9a897-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("hospital_v11_final");
    const profileDB = firebase.database().ref("hospital_staff_profiles");

    let role = "viewer", shift = "Day", selectedDate = "", appData = {}, staffProfiles = {}, currentEditKey = "";

    window.onload = () => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('dateInput').value = today;
        document.getElementById('bulkStart').value = today;
        document.getElementById('bulkEnd').value = today;
        selectedDate = today;
    };

    function login() {
        const id = document.getElementById('loginID').value.trim();
        const p = document.getElementById('loginPass').value;
        if(id === "ssgd" && p === "9099020925") role = "admin";
        else if(id === "ssgd" && p === "9712284024") role = "viewer";
        else return alert("Invalid ID/Pass");

        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('mainMenu').classList.remove('hidden');
        document.getElementById('roleBadge').classList.remove('hidden').innerText = role;
        startSync();
    }

    function startSync() {
        db.on('value', (s) => appData = s.val() || { "Depts": ["OPD", "EMERGENCY", "OFF LIST", "ORTHOPEDIC"] });
        profileDB.on('value', (s) => staffProfiles = s.val() || {});
    }

    function showDutySection() {
        document.getElementById('mainMenu').classList.add('hidden');
        document.getElementById('dutySection').classList.remove('hidden');
        document.getElementById('dateArea').classList.remove('hidden');
        renderGrid();
    }
    function showProfileSection() {
        document.getElementById('mainMenu').classList.add('hidden');
        document.getElementById('profileSection').classList.remove('hidden');
    }
    function backToMenu() {
        document.querySelectorAll('#dutySection, #profileSection, #listPage, #dateArea').forEach(e => e.classList.add('hidden'));
        document.getElementById('mainMenu').classList.remove('hidden');
    }
    function backToDuty() {
        document.getElementById('listPage').classList.add('hidden');
        document.getElementById('dutySection').classList.remove('hidden');
    }

    function renderGrid() {
        const grid = document.getElementById('deptGrid');
        grid.innerHTML = "";
        const ds = appData["Depts"] || ["OPD", "EMERGENCY", "OFF LIST", "ORTHOPEDIC"];
        ds.forEach(d => {
            grid.innerHTML += `<div onclick="openView('${d}')" class="p-4 bg-white rounded-[25px] border border-slate-100 shadow-sm flex flex-col items-center btn-active">
                <span class="text-2xl mb-1">${d.includes('OFF')?'😴':'🏥'}</span>
                <span class="font-bold text-slate-700 text-[9px] uppercase">${d}</span>
            </div>`;
        });
    }

    function openView(d) {
        document.getElementById('dutySection').classList.add('hidden');
        document.getElementById('listPage').classList.remove('hidden');
        document.getElementById('lTitle').innerText = d;
        document.getElementById('lSub').innerText = `${shift} | ${selectedDate}`;
        let h = "";
        const limit = (d.toUpperCase() === 'OPD') ? 10 : 6;
        for(let i=1; i<=limit; i++) {
            let key = `${selectedDate}_${d}_${i}_${shift}`;
            let val = appData[key] || "---";
            h += `<div class="p-4 bg-slate-50 rounded-2xl flex justify-between items-center border-l-4 border-blue-600">
                <span class="text-[8px] font-bold text-slate-400 uppercase">Slot ${i}</span>
                <span onclick="${role==='admin'?`openEdit('${key}','${d}','${i}')`:''}" class="${role==='admin'?'text-blue-600 font-bold underline italic':'font-bold text-slate-800'}">${val}</span>
            </div>`;
        }
        document.getElementById('lBody').innerHTML = h;
    }

    let currentSlotIdx = "";
    function openEdit(key, dept, idx) {
        currentEditKey = key;
        currentSlotIdx = idx;
        document.getElementById('editDeptLabel').innerText = `${dept} - Slot ${idx}`;
        document.getElementById('staffInput').value = (appData[key] === "---") ? "" : (appData[key] || "");
        
        const list = document.getElementById('suggestionList');
        list.innerHTML = "";
        Object.values(staffProfiles).forEach(p => {
            if(p.exp.toUpperCase() === dept.toUpperCase()) {
                list.innerHTML += `<div onclick="setStaff('${p.name}')" class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-[9px] font-bold border border-blue-200">+ ${p.name}</div>`;
            }
        });
        document.getElementById('editModal').classList.remove('hidden');
    }

    function setStaff(name) { document.getElementById('staffInput').value = name; }
    function closeEdit() { document.getElementById('editModal').classList.add('hidden'); }

    // Bulk Save Logic
    async function saveSlot() {
        const staff = document.getElementById('staffInput').value.trim() || "---";
        const start = document.getElementById('bulkStart').value;
        const end = document.getElementById('bulkEnd').value;
        const dept = document.getElementById('lTitle').innerText;

        if (start === end) {
            // Single Date Save
            await db.child(currentEditKey).set(staff);
        } else {
            // Multi Date Bulk Save
            let curr = new Date(start);
            let last = new Date(end);
            while (curr <= last) {
                let dStr = curr.toISOString().split('T')[0];
                let bKey = `${dStr}_${dept}_${currentSlotIdx}_${shift}`;
                await db.child(bKey).set(staff);
                curr.setDate(curr.getDate() + 1);
            }
        }
        closeEdit();
        openView(dept);
    }

    function toggleShift() {
        shift = (shift === "Day") ? "Night" : "Day";
        document.getElementById('shiftIco').innerText = (shift === "Day") ? "☀️" : "🌙";
        if(!document.getElementById('listPage').classList.contains('hidden')) openView(document.getElementById('lTitle').innerText);
    }

    function refreshAll() {
        selectedDate = document.getElementById('dateInput').value;
        if(!document.getElementById('listPage').classList.contains('hidden')) openView(document.getElementById('lTitle').innerText);
    }

    function saveProfile() {
        const name = document.getElementById('profName').value.trim();
        const sid = document.getElementById('profID').value.trim();
        const exp = document.getElementById('profExp').value;
        if(!name || !sid || !exp) return alert("Fill all details");
        profileDB.child(sid).set({ name, exp }).then(() => { alert("Saved!"); backToMenu(); });
    }

    function doSearch() {
        const q = document.getElementById('searchBar').value.toLowerCase();
        const res = document.getElementById('searchBox');
        if(!q) { res.classList.add('hidden'); return; }
        let found = "";
        for(let k in appData) {
            if(k.startsWith(selectedDate) && k.endsWith(shift) && appData[k].toLowerCase().includes(q)) {
                found = k.split('_')[1]; break;
            }
        }
        alert(found ? `તમારી ડ્યુટી ${found} માં છે.` : "મળ્યું નથી.");
    }
</script>
</body>
</html>
