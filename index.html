<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanskardham Hospital | Vision v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .gradient-header { background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%); }
        .btn-active:active { transform: scale(0.95); transition: 0.1s; }
        .notice-card { border-left: 5px solid #ef4444; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        /* Custom Notification (No more vaghela alerts) */
        #customToast { visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 15px; padding: 16px; position: fixed; z-index: 999; left: 50%; bottom: 100px; transform: translateX(-50%); }
        #customToast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 100px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 100px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

<div id="customToast">સંદેશ અહીં આવશે</div>

<div class="max-w-md mx-auto min-h-screen flex flex-col bg-white relative shadow-2xl">
    
    <header id="mainHeader" class="hidden gradient-header text-white p-5 rounded-b-[35px] shadow-lg sticky top-0 z-50">
        <div class="flex justify-between items-center mb-1">
            <h1 class="text-xl font-black tracking-tighter uppercase">Sanskardham</h1>
            <div id="roleBadge" class="bg-white/20 px-2 py-0.5 rounded-lg text-[9px] font-bold uppercase border border-white/30 tracking-widest">Guest</div>
        </div>
        <div id="dateArea" class="flex items-center bg-black/10 rounded-xl px-3 py-1.5 mt-2">
            <span class="text-xs mr-2">📅</span>
            <input type="date" id="dateInput" onchange="refreshAll()" class="bg-transparent text-white font-bold outline-none text-xs w-full">
            <button onclick="toggleShift()" id="shiftIco" class="ml-2 bg-white/20 px-2 py-1 rounded text-sm">☀️</button>
        </div>
    </header>

    <div id="loginPage" class="p-8 flex-grow flex flex-col justify-center space-y-6">
        <div class="text-center mb-4">
            <div class="text-6xl mb-2">🏥</div>
            <h2 class="text-2xl font-black text-gray-800 uppercase italic tracking-tighter">Sanskardham Vision</h2>
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-[3px] mt-1">Staff Portal</p>
        </div>

        <div class="space-y-4">
            <input type="text" id="loginID" placeholder="User ID" class="w-full p-4 rounded-2xl bg-gray-50 border border-gray-200 outline-none text-center font-bold focus:border-blue-400 transition-all">
            <input type="password" id="loginPass" placeholder="Password" class="w-full p-4 rounded-2xl bg-gray-50 border border-gray-200 outline-none text-center font-bold focus:border-blue-400 transition-all">
            <button onclick="processLogin()" class="w-full gradient-header text-white p-4 rounded-2xl font-bold btn-active uppercase shadow-xl tracking-widest mt-2">Login</button>
        </div>
    </div>

    <div id="mainMenu" class="hidden p-5 space-y-4 flex-grow">
        <div class="grid grid-cols-2 gap-3">
            <div onclick="showSection('dutySection')" class="p-6 bg-white rounded-[30px] border-2 border-blue-50 shadow-sm flex flex-col items-center btn-active cursor-pointer">
                <span class="text-3xl mb-1">📅</span>
                <span class="font-black text-[10px] uppercase">Duty List</span>
            </div>
            <div onclick="showSection('noticeSection')" class="p-6 bg-white rounded-[30px] border-2 border-red-50 shadow-sm flex flex-col items-center btn-active cursor-pointer">
                <span class="text-3xl mb-1">📢</span>
                <span class="font-black text-[10px] uppercase">Notice Board</span>
            </div>
        </div>
    </div>

    <div id="noticeSection" class="hidden p-5 space-y-4 flex-grow pb-32">
        <button onclick="backToMenu()" class="text-blue-600 font-bold text-[10px] uppercase">⬅ Back</button>
        <h2 class="text-2xl font-black text-gray-800 uppercase italic">📢 સૂચના બોર્ડ</h2>
        <div id="adminNoticeInput" class="hidden bg-red-50 p-4 rounded-[25px] space-y-3 border border-red-100 shadow-inner">
            <textarea id="noticeText" rows="2" class="w-full p-3 rounded-xl border-none font-bold text-sm outline-none" placeholder="નવી સૂચના અહીં લખો..."></textarea>
            <button onclick="postNotice()" class="w-full bg-red-600 text-white p-3 rounded-xl font-bold uppercase text-[10px] shadow-md">સૂચના મોકલો</button>
        </div>
        <div id="noticeList" class="space-y-4"></div>
    </div>

    <div id="dutySection" class="hidden p-5 space-y-4 flex-grow pb-32">
        <button onclick="backToMenu()" class="text-blue-600 font-bold text-[10px] uppercase">⬅ Back</button>
        <div id="deptGrid" class="grid grid-cols-2 gap-3 mt-4"></div>
    </div>

    <div id="slotListPage" class="hidden p-5 flex-grow pb-32">
        <button onclick="showSection('dutySection')" class="text-blue-600 font-bold text-[10px] uppercase">⬅ Back</button>
        <div class="text-center my-4">
            <h2 id="deptTitle" class="text-2xl font-black uppercase italic text-slate-800"></h2>
            <p id="deptSub" class="text-[9px] font-bold text-gray-400 uppercase tracking-widest"></p>
        </div>
        <div id="slotBody" class="space-y-3"></div>
    </div>

    <div id="slotModal" class="hidden fixed inset-0 bg-black/60 z-[200] flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white w-full rounded-[35px] p-6 shadow-2xl">
            <h3 class="font-black text-center mb-4 uppercase text-sm border-b pb-2">ડ્યુટી સેટ કરો</h3>
            <input type="text" id="staffNameInput" placeholder="સ્ટાફનું નામ લખો..." class="w-full p-4 bg-gray-50 rounded-2xl font-bold text-center mb-4 border border-gray-100 outline-none">
            <div class="flex space-x-2">
                <button onclick="closeModal()" class="flex-1 p-4 bg-gray-100 rounded-2xl font-bold text-gray-400 text-xs">CANCEL</button>
                <button onclick="saveSlotDuty()" class="flex-1 p-4 gradient-header text-white rounded-2xl font-bold text-xs shadow-lg">SAVE</button>
            </div>
        </div>
    </div>

    <footer class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 border-t p-3 flex justify-center z-50">
        <p class="text-blue-900 font-black text-[8px] tracking-[4px] opacity-40 uppercase">Jatin Solanki By Vision</p>
    </footer>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://jatin-9a897-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("hospital_v11_final");
    const noticeDB = firebase.database().ref("hospital_notices_v2");

    let userRole = "staff", shift = "Day", selectedDate = "", appData = {}, currentEditingKey = "";

    function showToast(msg) {
        const x = document.getElementById("customToast");
        x.innerText = msg;
        x.className = "show";
        setTimeout(() => { x.className = x.className.replace("show", ""); }, 3000);
    }

    // --- LOGIN LOGIC WITH AUTO-ROLE DETECTION ---
    function processLogin() {
        const id = document.getElementById('loginID').value.trim();
        const pass = document.getElementById('loginPass').value;

        if (id === "ssgd" && pass === "9099020925") {
            userRole = "admin";
            loginSuccess("ADMIT");
        } else if (id === "ssgd" && pass === "9712284024") {
            userRole = "staff";
            loginSuccess("STAFF");
        } else {
            showToast("ખોટો ID અથવા Password!");
        }
    }

    function loginSuccess(roleText) {
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('mainMenu').classList.remove('hidden');
        document.getElementById('mainHeader').classList.remove('hidden');
        document.getElementById('roleBadge').innerText = roleText;
        selectedDate = new Date().toISOString().split('T')[0];
        document.getElementById('dateInput').value = selectedDate;
        
        if(userRole === 'admin') document.getElementById('adminNoticeInput').classList.remove('hidden');
        
        db.on('value', (s) => { appData = s.val() || {}; });
        syncNotices();
        showToast("લોગિન સફળ!");
    }

    function syncNotices() {
        noticeDB.on('value', (snap) => {
            const list = document.getElementById('noticeList');
            list.innerHTML = "";
            const data = snap.val();
            if(!data) return list.innerHTML = "<p class='text-center text-gray-400 text-[10px] py-10 font-bold uppercase'>કોઈ સૂચના નથી.</p>";
            Object.keys(data).reverse().forEach(id => {
                const n = data[id];
                list.innerHTML += `
                    <div class="notice-card p-4 rounded-2xl mb-3">
                        <div class="flex justify-between items-start mb-2 pb-1 border-b border-gray-50">
                            <span class="bg-red-600 text-white px-2 py-0.5 rounded text-[7px] font-black uppercase tracking-widest">Official</span>
                            <div class="text-right">
                                <p class="text-[8px] font-black text-slate-800">${n.date}</p>
                                <p class="text-[7px] font-bold text-blue-500">${n.time}</p>
                            </div>
                        </div>
                        <p class="text-sm font-bold text-slate-700 leading-snug">${n.text}</p>
                        ${userRole === 'admin' ? `<button onclick="deleteNotice('${id}')" class="text-[8px] text-red-200 mt-2 font-bold uppercase tracking-tighter">× Delete</button>` : ''}
                    </div>`;
            });
        });
    }

    function postNotice() {
        const text = document.getElementById('noticeText').value.trim();
        if(!text) return;
        noticeDB.push({
            text: text,
            date: new Date().toLocaleDateString('gu-IN', {day:'2-digit', month:'short', year:'numeric'}),
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        }).then(() => {
            document.getElementById('noticeText').value = "";
            showToast("સૂચના મોકલાઈ ગઈ!");
        });
    }

    function deleteNotice(id) {
        if(confirm("આ સૂચના કાઢી નાખવી છે?")) {
            noticeDB.child(id).remove();
            showToast("સૂચના હટાવી દીધી.");
        }
    }

    function showSection(id) {
        document.querySelectorAll('#mainMenu, #dutySection, #noticeSection, #slotListPage').forEach(e => e.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(id === 'dutySection') renderGrid();
    }

    function backToMenu() { showSection('mainMenu'); }

    function renderGrid() {
        const grid = document.getElementById('deptGrid');
        grid.innerHTML = "";
        ["OPD", "EMERGENCY", "ICU", "WARD", "DAYCARE", "OFF LIST"].forEach(d => {
            grid.innerHTML += `<div onclick="openDeptSlots('${d}')" class="p-6 bg-white rounded-[30px] border border-gray-100 shadow-sm flex flex-col items-center btn-active cursor-pointer">
                <span class="text-3xl mb-1">${d.includes('OFF') ? '😴' : '🏥'}</span>
                <span class="font-bold text-[10px] uppercase text-slate-600">${d}</span>
            </div>`;
        });
    }

    function openDeptSlots(d) {
        showSection('slotListPage');
        document.getElementById('deptTitle').innerText = d;
        document.getElementById('deptSub').innerText = `${shift} | ${selectedDate}`;
        renderSlots(d);
    }

    function renderSlots(dept) {
        const body = document.getElementById('slotBody');
        body.innerHTML = "";
        for(let i=1; i<=10; i++) {
            let key = `${selectedDate}_${dept}_${i}_${shift}`;
            let staff = appData[key] || "---";
            body.innerHTML += `
                <div onclick="${userRole === 'admin' ? `openEditModal('${key}')` : ''}" class="p-4 bg-gray-50 rounded-2xl flex justify-between items-center border-l-4 border-blue-500 shadow-sm active:scale-95 transition-all">
                    <span class="text-[9px] font-black text-gray-400 uppercase tracking-widest">SLOT ${i}</span>
                    <span class="font-bold text-slate-800 ${userRole === 'admin' ? 'underline decoration-blue-200' : ''}">${staff}</span>
                </div>`;
        }
    }

    function openEditModal(key) {
        currentEditingKey = key;
        document.getElementById('staffNameInput').value = appData[key] === "---" ? "" : (appData[key] || "");
        document.getElementById('slotModal').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('slotModal').classList.add('hidden'); }

    function saveSlotDuty() {
        const val = document.getElementById('staffNameInput').value.trim() || "---";
        db.child(currentEditingKey).set(val).then(() => {
            appData[currentEditingKey] = val;
            closeModal();
            showToast("ડ્યુટી સેવ થઈ!");
            renderSlots(document.getElementById('deptTitle').innerText);
        });
    }

    function toggleShift() {
        shift = (shift === "Day") ? "Night" : "Day";
        document.getElementById('shiftIco').innerText = (shift === "Day") ? "☀️" : "🌙";
        if(!document.getElementById('slotListPage').classList.contains('hidden')) openDeptSlots
