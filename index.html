<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Duty - Experience Tracker</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; }
        
        /* Side Menu */
        .sidenav { height: 100%; width: 0; position: fixed; z-index: 10; top: 0; left: 0; background-color: #2c3e50; overflow-x: hidden; transition: 0.5s; padding-top: 60px; color: white; }
        .sidenav .closebtn { position: absolute; top: 0; right: 25px; font-size: 36px; cursor: pointer; }
        .menu-content { padding: 20px; }
        .menu-content input { width: 90%; padding: 10px; margin: 8px 0; border-radius: 5px; border: none; }
        
        header { background: #3498db; color: white; padding: 15px; display: flex; align-items: center; font-size: 20px; }
        .menu-icon { font-size: 30px; cursor: pointer; margin-right: 15px; }
        
        .container { display: flex; flex-wrap: wrap; gap: 20px; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); flex: 1; min-width: 320px; }
        
        /* Experience Alert Text */
        #expDisplay { color: #e74c3c; font-weight: bold; margin-top: 5px; font-size: 14px; display: block; height: 20px; }
        
        select, input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 5px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-add { background: #27ae60; color: white; border: none; cursor: pointer; font-weight: bold; font-size: 16px; }
        .btn-save-staff { background: #e67e22; color: white; border: none; cursor: pointer; margin-top: 20px; }
        
        .alert-item { background: #fdeaea; color: #c0392b; padding: 10px; margin-top: 5px; border-radius: 5px; border-left: 5px solid #e74c3c; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #34495e; color: white; }
    </style>
</head>
<body>

<div id="mySidenav" class="sidenav">
    <span class="closebtn" onclick="closeNav()">&times;</span>
    <div class="menu-content">
        <h3>➕ નવો સ્ટાફ એડ કરો</h3>
        <input type="text" id="newStaffName" placeholder="સ્ટાફનું નામ">
        <input type="number" id="newStaffRoll" placeholder="રોલ નંબર">
        <input type="text" id="newStaffExp" placeholder="અનુભવ (દા.ત. 3 વર્ષ)">
        <input type="text" id="newStaffMobile" placeholder="મોબાઈલ નંબર">
        <button class="btn-save-staff" onclick="saveStaff()">સેવ કરો</button>
    </div>
</div>

<header>
    <span class="menu-icon" onclick="openNav()">&#9776;</span>
    <span>હોસ્પિટલ ડ્યુટી મેનેજમેન્ટ</span>
</header>

<div class="container">
    <div class="card">
        <h3>📅 ડ્યુટી સેટ કરો</h3>
        <label>સ્ટાફ પસંદ કરો:</label>
        <select id="staffSelect" onchange="showExperience()"></select>
        <span id="expDisplay">અનુભવ: - </span>
        
        <label>વિભાગ:</label>
        <select id="dept">
            <option>ICU</option>
            <option>General Ward</option>
            <option>OPD</option>
            <option>OT</option>
            <option>Emergency</option>
        </select>
        
        <label>તારીખ:</label>
        <div style="display: flex; gap: 5px;">
            <input type="date" id="startDate">
            <input type="date" id="endDate">
        </div>
        
        <button class="btn-add" onclick="assignDuty()">➕ ડ્યુટી કન્ફર્મ કરો</button>
    </div>

    <div class="card">
        <h3 style="color: #e74c3c;">🚨 બાકી સ્ટાફ (Missing)</h3>
        <div id="missingStaffList"></div>
    </div>
</div>

<div style="padding: 20px;">
    <div class="card">
        <h3>📋 આજનું ડ્યુટી શિડ્યુલ</h3>
        <table id="dutyTable">
            <thead>
                <tr>
                    <th>નામ</th>
                    <th>અનુભવ</th>
                    <th>વિભાગ</th>
                    <th>શિફ્ટ/તારીખ</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    let masterStaff = []; 
    let assignedStaffNames = [];

    function openNav() { document.getElementById("mySidenav").style.width = "300px"; }
    function closeNav() { document.getElementById("mySidenav").style.width = "0"; }

    function saveStaff() {
        let name = document.getElementById("newStaffName").value;
        let roll = document.getElementById("newStaffRoll").value;
        let exp = document.getElementById("newStaffExp").value;
        let mobile = document.getElementById("newStaffMobile").value;

        if(!name || !exp) { alert("નામ અને અનુભવ લખવો જરૂરી છે!"); return; }

        masterStaff.push({ name: name, roll: roll, exp: exp, mobile: mobile });
        
        // Clear inputs
        document.getElementById("newStaffName").value = "";
        document.getElementById("newStaffRoll").value = "";
        document.getElementById("newStaffExp").value = "";
        document.getElementById("newStaffMobile").value = "";
        
        closeNav();
        updateUI();
    }

    // નામ સિલેક્ટ કરો ત્યારે અનુભવ બતાવવા માટે
    function showExperience() {
        let selectedName = document.getElementById("staffSelect").value;
        let staff = masterStaff.find(s => s.name === selectedName);
        if(staff) {
            document.getElementById("expDisplay").innerText = "અનુભવ: " + staff.exp;
        }
    }

    function updateUI() {
        let select = document.getElementById("staffSelect");
        let alertList = document.getElementById("missingStaffList");
        
        select.innerHTML = "<option value=''>-- પસંદ કરો --</option>";
        alertList.innerHTML = "";

        masterStaff.forEach(staff => {
            let opt = document.createElement("option");
            opt.value = staff.name;
            opt.text = staff.name;
            select.appendChild(opt);

            if (!assignedStaffNames.includes(staff.name)) {
                let div = document.createElement("div");
                div.className = "alert-item";
                div.innerHTML = `❌ <b>${staff.name}</b> (${staff.exp} અનુભવ)`;
                alertList.appendChild(div);
            }
        });
    }

    function assignDuty() {
        let name = document.getElementById("staffSelect").value;
        let dept = document.getElementById("dept").value;
        let sDate = document.getElementById("startDate").value;
        let eDate = document.getElementById("endDate").value;

        if(!name || !sDate) { alert("સ્ટાફ અને તારીખ પસંદ કરો!"); return; }

        if(!assignedStaffNames.includes(name)) {
            assignedStaffNames.push(name);
        }

        let staffObj = masterStaff.find(s => s.name === name);
        let table = document.getElementById("dutyTable").getElementsByTagName('tbody')[0];
        let row = table.insertRow();
        row.innerHTML = `
            <td><b>${staffObj.name}</b></td>
            <td>${staffObj.exp}</td>
            <td>${dept}</td>
            <td>${sDate} થી ${eDate}</td>
        `;

        updateUI();
        document.getElementById("expDisplay").innerText = "અનુભવ: - ";
    }
</script>

</body>
</html>
