<!doctype html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanskardham Hospital | Vision v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .gradient-header { background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%); }
        .sidebar { transition: 0.3s; position: fixed; top: 0; left: -280px; height: 100%; width: 280px; background: white; z-index: 1000; box-shadow: 10px 0 20px rgba(0,0,0,0.1); }
        .sidebar.open { left: 0; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; }
        .overlay.active { display: block; }
        .btn-active:active { transform: scale(0.95); }
        
        .suggestion-box { position: absolute; width: 100%; background: white; border: 2px solid #e2e8f0; border-radius: 15px; max-height: 220px; overflow-y: auto; z-index: 3000; box-shadow: 0 15px 25px -5px rgba(0, 0, 0, 0.1); margin-top: 5px; }
        .suggestion-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
        .suggestion-item:hover { background-color: #eff6ff; }
        .exp-tag { font-size: 9px; background: #dbeafe; color: #1e40af; padding: 3px 10px; border-radius: 50px; font-weight: 800; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div id="sidebar" class="sidebar p-6 flex flex-col">
    <div class="mb-4 border-b pb-4">
        <h2 class="text-xl font-black text-blue-900">SANSKARDHAM</h2>
        <p class="text-[10px] font-bold text-gray-400 tracking-widest uppercase" data-tr="nav">Navigation</p>
    </div>

    <div class="mb-6 bg-blue-50 p-3 rounded-2xl">
        <p class="text-[9px] font-bold text-blue-600 uppercase mb-2" data-tr="lang">Language / ભાષા</p>
        <div class="flex justify-between">
            <button onclick="setLang('gu')" class="px-3 py-1 bg-white rounded-lg text-[10px] font-bold shadow-sm border">GUJ</button>
            <button onclick="setLang('hi')" class="px-3 py-1 bg-white rounded-lg text-[10px] font-bold shadow-sm border">HIN</button>
            <button onclick="setLang('en')" class="px-3 py-1 bg-white rounded-lg text-[10px] font-bold shadow-sm border">ENG</button>
        </div>
    </div>

    <nav class="space-y-2 flex-grow">
        <button onclick="showSection('profileSection')" class="w-full text-left p-4 rounded-xl hover:bg-blue-50 flex items-center space-x-3 font-bold text-gray-700"><span>👤</span> <span data-tr="add_staff_btn">Add Staff</span></button>
        <button onclick="showSection('dutySection')" class="w-full text-left p-4 rounded-xl hover:bg-blue-50 flex items-center space-x-3 font-bold text-gray-700"><span>📅</span> <span data-tr="duty_board_btn">Duty Board</span></button>
        
        <div id="adminMenu" class="hidden pt-4 border-t mt-4 space-y-2">
            <p class="text-[9px] font-bold text-blue-600 uppercase px-4" data-tr="admin_panel">Admin Panel</p>
            <button onclick="showSection('deptManageSection'); renderDeptManager();" class="w-full text-left p-4 rounded-xl bg-purple-50 text-purple-700 flex items-center space-x-3 font-bold"><span>🏢</span> <span data-tr="depts">Departments</span></button>
            <button onclick="showSection('staffListSection'); loadStaffRecords();" class="w-full text-left p-4 rounded-xl bg-blue-50 text-blue-700 flex items-center space-x-3 font-bold"><span>📋</span> <span data-tr="records">Staff Records</span></button>
            <button onclick="showSection('fullDutySection'); loadFullDutyRecords();" class="w-full text-left p-4 rounded-xl bg-blue-600 text-white flex items-center space-x-3 font-bold shadow-md"><span>📝</span> <span data-tr="full_list">Full Duty List</span></button>
        </div>
    </nav>
    <button onclick="location.reload()" class="p-4 bg-red-50 rounded-xl font-bold text-red-500 text-xs text-center uppercase" data-tr="logout">Logout</button>
</div>

<div class="max-w-md mx-auto min-h-screen flex flex-col bg-white shadow-2xl relative">
    <header class="gradient-header text-white p-6 rounded-b-[40px] sticky top-0 z-50 shadow-lg">
        <div class="flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <button id="menuBtn" onclick="toggleMenu()" class="text-2xl hidden">☰</button>
                <button id="backBtn" onclick="showSection('dutySection')" class="text-2xl hidden">⬅</button>
                <div>
                    <h1 class="text-xl font-black uppercase leading-none">Sanskardham</h1>
                    <p class="text-[9px] font-bold text-blue-200 tracking-widest uppercase">Vision v2.0</p>
                </div>
            </div>
            <div id="roleBadge" class="hidden bg-white/20 px-3 py-1 rounded-xl text-[10px] font-bold uppercase">Guest</div>
        </div>
        <div id="dateArea" class="hidden mt-4 flex items-center bg-black/10 rounded-2xl px-4 py-2">
            <input type="date" id="dateInput" onchange="refreshData()" class="bg-transparent text-white font-bold outline-none text-sm w-full">
            <button onclick="toggleShift()" id="shiftIco" class="ml-2 bg-white/20 p-1 rounded-lg text-lg">☀️</button>
        </div>
    </header>

    <main class="flex-grow p-4">
        <div id="loginPage" class="flex flex-col justify-center space-y-5 py-10">
            <div class="text-center">
                <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4 text-4xl shadow-inner">🏥</div>
                <h2 class="text-2xl font-black text-gray-800" data-tr="portal">Staff Portal</h2>
            </div>
            <div class="space-y-3">
                <input type="text" id="loginID" placeholder="User ID" class="w-full p-4 rounded-2xl bg-gray-50 border outline-none text-center font-bold focus:ring-2 focus:ring-blue-600">
                <input type="password" id="loginPass" placeholder="Password" class="w-full p-4 rounded-2xl bg-gray-50 border outline-none text-center font-bold focus:ring-2 focus:ring-blue-600">
            </div>
            <button onclick="login()" class="w-full gradient-header text-white p-5 rounded-2xl font-bold uppercase tracking-widest shadow-xl btn-active" data-tr="login_btn">Login</button>
        </div>

        <div id="dutySection" class="hidden space-y-6">
            <div class="relative">
                <input type="text" id="searchBar" onkeyup="searchName()" data-tr-ph="search_ph" placeholder="શોધો..." class="w-full p-4 pl-12 rounded-2xl border font-bold shadow-sm outline-none focus:border-blue-500">
                <span class="absolute left-4 top-4">🔍</span>
            </div>
            <div id="searchRes" class="hidden p-4 rounded-2xl font-bold text-center"></div>
            <div id="deptGrid" class="grid grid-cols-2 gap-4"></div>
        </div>

        <div id="profileSection" class="hidden space-y-4">
            <h2 id="formTitle" class="text-2xl font-black text-blue-900" data-tr="add_staff_title">Add New Staff</h2>
            <div class="bg-white p-6 rounded-3xl border space-y-4 shadow-sm">
                <input type="hidden" id="editStaffKey">
                <input type="text" id="pName" data-tr-ph="name_ph" placeholder="Name" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border outline-none">
                <input type="text" id="pID" data-tr-ph="id_ph" placeholder="ID" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border outline-none">
                <input type="number" id="pMobile" data-tr-ph="mob_ph" placeholder="Mobile" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border outline-none">
                <input type="text" id="pExp" data-tr-ph="exp_ph" placeholder="Experience" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border outline-none">
                <button id="saveStaffBtn" onclick="saveProfile()" class="w-full gradient-header text-white p-4 rounded-2xl font-bold shadow-lg uppercase" data-tr="save_btn">SAVE STAFF</button>
                <button id="cancelEditBtn" onclick="resetStaffForm(); showSection('staffListSection');" class="hidden w-full bg-gray-100 text-gray-500 p-4 rounded-2xl font-bold" data-tr="cancel">CANCEL</button>
            </div>
        </div>

        <div id="listPage" class="hidden space-y-4">
            <div class="text-center bg-blue-50 py-4 rounded-3xl">
                <h2 id="lTitle" class="text-2xl font-black text-blue-900 uppercase"></h2>
                <p id="lSub" class="text-[10px] font-bold text-blue-400 mt-1"></p>
            </div>
            <div id="lBody" class="space-y-3"></div>
        </div>

        <div id="deptManageSection" class="hidden space-y-4">
            <h2 class="text-2xl font-black text-blue-900 px-2" data-tr="depts">Departments</h2>
            <div id="deptListItems" class="space-y-3"></div>
        </div>

        <div id="staffListSection" class="hidden space-y-4">
            <h2 class="text-2xl font-black text-blue-900 px-2" data-tr="records">Staff Records</h2>
            <div id="staffListCont" class="space-y-2"></div>
        </div>

    </main>

    <footer class="p-4 flex justify-center border-t bg-white">
        <p class="text-blue-900 font-black text-[10px] tracking-[5px] opacity-60 uppercase">JATIN SOLANKI</p>
    </footer>
</div>

<div id="rangeModal" class="hidden fixed inset-0 bg-black/70 z-[2000] flex items-center justify-center p-6 backdrop-blur-md">
    <div class="bg-white w-full max-w-sm rounded-[40px] p-8 shadow-2xl relative">
        <h3 class="font-black text-center border-b pb-3 mb-5 text-blue-900 uppercase" data-tr="set_duty">Set Duty</h3>
        <div class="space-y-4 mb-6">
            <div class="flex space-x-3">
                <div class="flex-1"><label class="text-[9px] font-bold text-gray-400 block mb-1" data-tr="start">START</label><input type="date" id="rStart" class="w-full p-2 bg-gray-50 border rounded-xl text-xs font-bold"></div>
                <div class="flex-1"><label class="text-[9px] font-bold text-gray-400 block mb-1" data-tr="end">END</label><input type="date" id="rEnd" class="w-full p-2 bg-gray-50 border rounded-xl text-xs font-bold"></div>
            </div>
            <div class="relative">
                <label class="text-[9px] font-bold text-gray-400 block mb-1" data-tr="sel_staff">SELECT STAFF</label>
                <input type="text" id="rStaff" onkeyup="showSuggestions(this.value)" data-tr-ph="type_name" placeholder="Type name..." autocomplete="off" class="w-full p-4 bg-blue-50 rounded-2xl font-bold text-center outline-none border border-blue-100">
                <div id="staffSuggestions" class="suggestion-box hidden"></div>
            </div>
        </div>
        <div class="flex space-x-3">
            <button onclick="closeModal()" class="flex-1 p-4 bg-gray-100 rounded-2xl font-bold text-gray-500 text-xs" data-tr="cancel">CANCEL</button>
            <button onclick="saveRangeDuty()" class="flex-1 p-4 gradient-header text-white rounded-2xl font-bold text-xs uppercase shadow-lg" data-tr="save_btn">SAVE</button>
        </div>
    </div>
</div>

<script>
    // --- TRANSLATIONS ---
    const translations = {
        gu: {
            nav: "નેવિગેશન", lang: "ભાષા બદલો", add_staff_btn: "સ્ટાફ ઉમેરો", duty_board_btn: "ડ્યુટી બોર્ડ",
            admin_panel: "એડમિન પેનલ", depts: "વિભાગો", records: "સ્ટાફ રેકોર્ડ", full_list: "આખું લિસ્ટ",
            logout: "લોગઆઉટ", portal: "સ્ટાફ પોર્ટલ", login_btn: "લોગિન", search_ph: "નામથી ડ્યુટી શોધો...",
            add_staff_title: "નવો સ્ટાફ", name_ph: "પૂરું નામ", id_ph: "આઈડી", mob_ph: "મોબાઈલ", exp_ph: "અનુભવ (દા.ત. OPD)",
            save_btn: "સેવ કરો", set_duty: "ડ્યુટી સેટ કરો", start: "શરૂઆત", end: "અંત", sel_staff: "સ્ટાફ પસંદ કરો",
            type_name: "નામ ટાઇપ કરો...", cancel: "કેન્સલ", found: "✅ તમારી ડ્યુટી {dep} માં છે.", not_found: "⚠️ નામ મળ્યું નથી.",
            already_busy: "ભૂલ: {name} આ તારીખે બીજી જગ્યાએ ડ્યુટી પર છે!"
        },
        hi: {
            nav: "नेविगेशन", lang: "भाषा बदलें", add_staff_btn: "स्टाफ जोड़ें", duty_board_btn: "ड्यूटी बोर्ड",
            admin_panel: "एडमिन पैनल", depts: "विभाग", records: "स्टाफ रिकॉर्ड", full_list: "पूरी सूची",
            logout: "लॉगआउट", portal: "स्टाफ पोर्टल", login_btn: "लॉगिन", search_ph: "नाम से ड्यूटी खोजें...",
            add_staff_title: "नया स्टाफ", name_ph: "पूरा नाम", id_ph: "आईडी", mob_ph: "मोबाइल", exp_ph: "अनुभव (जैसे OPD)",
            save_btn: "सेव करें", set_duty: "ड्यूटी सेट करें", start: "शुरू", end: "अंत", sel_staff: "स्टाफ चुनें",
            type_name: "नाम टाइप करें...", cancel: "कैंसिल", found: "✅ आपकी ड्यूटी {dep} में है।", not_found: "⚠️ नाम नहीं मिला।",
            already_busy: "गलती: {name} इस तारीख को दूसरी जगह ड्यूटी पर है!"
        },
        en: {
            nav: "Navigation", lang: "Change Language", add_staff_btn: "Add Staff", duty_board_btn: "Duty Board",
            admin_panel: "Admin Panel", depts: "Departments", records: "Staff Records", full_list: "Full Duty List",
            logout: "Logout", portal: "Staff Portal", login_btn: "Login", search_ph: "Search duty by name...",
            add_staff_title: "New Staff", name_ph: "Full Name", id_ph: "ID", mob_ph: "Mobile", exp_ph: "Experience (e.g. OPD)",
            save_btn: "SAVE", set_duty: "Set Duty", start: "START", end: "END", sel_staff: "SELECT STAFF",
            type_name: "Type name...", cancel: "CANCEL", found: "✅ Duty found in {dep}.", not_found: "⚠️ Name not found.",
            already_busy: "Error: {name} is already on duty elsewhere on this date!"
        }
    };

    let currentLang = localStorage.getItem('hospital_lang') || 'gu';

    function setLang(l) {
        currentLang = l;
        localStorage.setItem('hospital_lang', l);
        applyTrans();
        if(!document.getElementById('dutySection').classList.contains('hidden')) renderGrid();
    }

    function applyTrans() {
        const t = translations[currentLang];
        document.querySelectorAll('[data-tr]').forEach(el => {
            const key = el.getAttribute('data-tr');
            if(t[key]) el.innerText = t[key];
        });
        document.querySelectorAll('[data-tr-ph]').forEach(el => {
            const key = el.getAttribute('data-tr-ph');
            if(t[key]) el.placeholder = t[key];
        });
    }

    // --- DATABASE CONFIG ---
    const firebaseConfig = { databaseURL: "https://jatin-9a897-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("hospital_v11_final");
    const profDB = firebase.database().ref("staff_profiles");

    let role = "viewer", shift = "Day", selDate = "", appData = {}, editKey = "", allStaffRaw = {};

    window.onload = () => { applyTrans(); };

    // --- CORE LOGIC ---
    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('active'); }

    function showSection(id) { 
        if(document.getElementById('sidebar').classList.contains('open')) toggleMenu();
        const ids = ['loginPage', 'profileSection', 'dutySection', 'listPage', 'staffListSection', 'fullDutySection', 'deptManageSection'];
        ids.forEach(x => { if(document.getElementById(x)) document.getElementById(x).classList.add('hidden') });
        document.getElementById(id).classList.remove('hidden');
        
        document.getElementById('menuBtn').classList.toggle('hidden', id === 'loginPage' || id !== 'dutySection');
        document.getElementById('backBtn').classList.toggle('hidden', id === 'loginPage' || id === 'dutySection');
    }

    function login() {
        const id = document.getElementById('loginID').value.trim();
        const p = document.getElementById('loginPass').value;
        if(id === "ssgd" && p === "9099020925") role = "admin";
        else if(id === "ssgd" && p === "9712284024") role = "viewer";
        else return alert("Invalid Password!");

        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('dateArea').classList.remove('hidden');
        document.getElementById('roleBadge').classList.remove('hidden');
        document.getElementById('roleBadge').innerText = role;
        if(role === 'admin') document.getElementById('adminMenu').classList.remove('hidden');
        selDate = new Date().toISOString().split('T')[0];
        document.getElementById('dateInput').value = selDate;
        showSection('dutySection');
        syncData();
        fetchAllStaff();
    }

    function syncData() { 
        db.on('value', (s) => { 
            appData = s.val() || {}; 
            if(!appData.Depts) appData.Depts = ["OPD", "EMERGENCY", "ORTHOPEDIC", "OFF LIST"];
            renderGrid(); 
        }); 
    }

    function fetchAllStaff() {
        profDB.on('value', (s) => { allStaffRaw = s.val() || {}; });
    }

    function renderGrid() {
        const grid = document.getElementById('deptGrid');
        grid.innerHTML = "";
        (appData.Depts || []).forEach(d => {
            grid.innerHTML += `
                <div onclick="openSlots('${d}')" class="p-6 bg-white rounded-[35px] border border-blue-50 shadow-sm flex flex-col items-center btn-active cursor-pointer">
                    <span class="text-3xl mb-2">🏥</span>
                    <span class="font-black text-blue-900 text-xs uppercase">${d}</span>
                </div>`;
        });
    }

    function openSlots(d) {
        showSection('listPage');
        document.getElementById('lTitle').innerText = d;
        document.getElementById('lSub').innerText = `${shift} | ${selDate}`;
        let h = "";
        const limit = (d === 'OPD') ? 10 : 6;
        for(let i=1; i<=limit; i++) {
            let key = `${selDate}_${d}_${i}_${shift}`;
            let val = appData[key] || "---";
            const handler = role === 'admin' ? `onclick="openRangeModal('${key}')"` : "";
            h += `
                <div class="p-4 bg-slate-50 rounded-2xl flex justify-between items-center border-l-4 border-blue-600">
                    <span class="text-[10px] font-bold text-gray-400 uppercase">Slot ${i}</span>
                    <span ${handler} class="${role==='admin'?'cursor-pointer text-blue-600 underline font-black':'font-black text-gray-800'}">${val}</span>
                </div>`;
        }
        document.getElementById('lBody').innerHTML = h;
    }

    function openRangeModal(key) { 
        editKey = key; 
        document.getElementById('rStaff').value = (appData[key] === "---") ? "" : appData[key]; 
        document.getElementById('rStart').value = selDate; 
        document.getElementById('rEnd').value = selDate; 
        document.getElementById('rangeModal').classList.remove('hidden'); 
        showSuggestions(""); 
    }

    function closeModal() { document.getElementById('rangeModal').classList.add('hidden'); document.getElementById('staffSuggestions').classList.add('hidden'); }

    function showSuggestions(val) {
        const box = document.getElementById('staffSuggestions');
        const parts = editKey.split('_');
        const currentDept = parts[1].toLowerCase();
        const currentShift = parts[3];
        const dateInput = document.getElementById('rStart').value;

        // ૧. Check assigned staff for current date and shift
        let busyList = [];
        Object.keys(appData).forEach(k => {
            if(k.startsWith(dateInput) && k.endsWith(currentShift) && appData[k] !== "---") {
                busyList.push(appData[k].toLowerCase());
            }
        });

        const filtered = Object.values(allStaffRaw).filter(s => {
            const matchesSearch = s.name.toLowerCase().includes(val.toLowerCase());
            const matchesExp = s.exp && s.exp.toLowerCase().includes(currentDept);
            const isBusy = busyList.includes(s.name.toLowerCase());
            return matchesSearch && matchesExp && !isBusy;
        });

        if (filtered.length > 0) {
            box.innerHTML = filtered.map(s => `<div class="suggestion-item" onclick="selectStaff('${s.name}')"><span class="font-bold">${s.name}</span><span class="exp-tag">${s.exp}</span></div>`).join('');
            box.classList.remove('hidden');
        } else {
            box.innerHTML = `<div class="p-4 text-center text-gray-400 text-xs">No available staff found</div>`;
            box.classList.remove('hidden');
        }
    }

    function selectStaff(name) { document.getElementById('rStaff').value = name; document.getElementById('staffSuggestions').classList.add('hidden'); }

    function saveRangeDuty() {
        const name = document.getElementById('rStaff').value.trim() || "---";
        const start = new Date(document.getElementById('rStart').value);
        const end = new Date(document.getElementById('rEnd').value);
        const parts = editKey.split('_'); 
        const t = translations[currentLang];

        if(name !== "---") {
            let tempCheck = new Date(start);
            while(tempCheck <= end) {
                let checkDate = tempCheck.toISOString().split('T')[0];
                for(let k in appData) {
                    if(k.startsWith(checkDate) && k.endsWith(parts[3]) && appData[k].toLowerCase() === name.toLowerCase()) {
                        alert(t.already_busy.replace('{name}', name));
                        return;
                    }
                }
                tempCheck.setDate(tempCheck.getDate() + 1);
            }
        }

        let updates = {};
        let temp = new Date(start);
        while(temp <= end) {
            let k = `${temp.toISOString().split('T')[0]}_${parts[1]}_${parts[2]}_${parts[3]}`;
            updates[k] = name;
            temp.setDate(temp.getDate() + 1);
        }
        db.update(updates).then(() => { closeModal(); openSlots(parts[1]); });
    }

    function saveProfile() {
        const key = document.getElementById('editStaffKey').value;
        const data = {
            name: document.getElementById('pName').value.trim(),
            id: document.getElementById('pID').value.trim(),
            mob: document.getElementById('pMobile').value.trim(),
            exp: document.getElementById('pExp').value.trim()
        };
        if(!data.name || !data.exp) return alert("Fill required fields!");
        if(key) profDB.child(key).update(data).then(() => { resetStaffForm(); showSection('dutySection'); });
        else profDB.push(data).then(() => { resetStaffForm(); showSection('dutySection'); });
    }

    function resetStaffForm() { 
        document.getElementById('editStaffKey').value = ""; 
        document.getElementById('pName').value = ""; 
        document.getElementById('pID').value = ""; 
        document.getElementById('pMobile').value = ""; 
        document.getElementById('pExp').value = ""; 
    }

    function toggleShift() { 
        shift = (shift === "Day") ? "Night" : "Day"; 
        document.getElementById('shiftIco').innerText = (shift === "Day") ? "☀️" : "🌙"; 
        refreshData(); 
    }

    function refreshData() { 
        selDate = document.getElementById('dateInput').value; 
        if(!document.getElementById('listPage').classList.contains('hidden')) openSlots(document.getElementById('lTitle').innerText); 
    }
    
    function searchName() {
        const q = document.getElementById('searchBar').value.toLowerCase();
        const t = translations[currentLang];
        let foundDep = "";
        if(!q) { document.getElementById('searchRes').classList.add('hidden'); return; }
        for(let k in appData) { if(k.startsWith(selDate) && k.endsWith(shift) && appData[k].toLowerCase().includes(q)) { foundDep = k.split('_')[1]; break; } }
        const resDiv = document.getElementById('searchRes');
        resDiv.classList.remove('hidden');
        resDiv.innerHTML = foundDep ? t.found.replace('{dep}', foundDep) : t.not_found;
        resDiv.className = `p-4 rounded-2xl font-bold text-center ${foundDep?'bg-green-50 text-green-700':'bg-red-50 text-red-700'}`;
    }

    function loadStaffRecords() {
        const cont = document.getElementById('staffListCont');
        cont.innerHTML = Object.keys(allStaffRaw).map(key => {
            const s = allStaffRaw[key];
            return `<div class="p-4 bg-white border rounded-2xl flex justify-between items-center shadow-sm">
                        <div><p class="font-bold text-blue-900">${s.name}</p><p class="text-[10px] text-gray-400">${s.exp}</p></div>
                        <button onclick="editStaff('${key}')" class="bg-blue-50 text-blue-600 px-3 py-1 rounded-lg font-bold text-xs">EDIT</button>
                    </div>`;
        }).join('');
    }

    function editStaff(key) {
        const s = allStaffRaw[key];
        document.getElementById('editStaffKey').value = key;
        document.getElementById('pName').value = s.name;
        document.getElementById('pExp').value = s.exp;
        showSection('profileSection');
    }
</script>
</body>
</html>
