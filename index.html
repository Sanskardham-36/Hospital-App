<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanskardham Hospital | Vision v2.0</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; touch-action: manipulation; }
        .gradient-header { background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%); }
        .btn-active:active { transform: scale(0.95); transition: 0.1s; }
        .main-card { transition: all 0.3s ease; border: 1px solid #e2e8f0; }
        .main-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .download-fab { position: fixed; bottom: 85px; right: 20px; z-index: 100; }
        .modal-anim { animation: zoomIn 0.2s ease-out; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>

<body>

<div class="max-w-md mx-auto min-h-screen flex flex-col bg-white relative shadow-2xl overflow-x-hidden">
    
    <header class="gradient-header text-white p-6 rounded-b-[40px] shadow-lg sticky top-0 z-50">
        <div class="flex justify-between items-center mb-2">
            <div>
                <h1 class="text-2xl font-black tracking-tighter uppercase leading-none">Sanskardham</h1>
                <p class="text-[10px] font-bold text-blue-200 uppercase mt-1 tracking-widest">Vision v2.0</p>
            </div>
            <div id="roleBadge" class="hidden bg-white/20 px-3 py-1 rounded-xl text-[10px] font-bold uppercase tracking-widest">Guest</div>
        </div>

        <!-- DATE + RANGE -->
        <div id="dateArea" class="hidden flex flex-col bg-black/10 rounded-2xl px-4 py-2 mt-2">
            <div class="flex items-center">
                <span class="text-xs mr-2">📅</span>
                <input type="date" id="dateInput" onchange="refreshAll()" class="bg-transparent text-white font-bold outline-none text-sm w-full">
                <button onclick="toggleShift()" id="shiftIco" class="ml-2 bg-white/20 p-1 rounded-lg text-lg">☀️</button>
            </div>

            <div class="flex space-x-2 mt-2">
                <input type="date" id="fromDate" class="w-1/2 p-2 rounded-lg text-black font-bold">
                <input type="date" id="toDate" class="w-1/2 p-2 rounded-lg text-black font-bold">
            </div>
        </div>
    </header>

    <!-- LOGIN -->
    <div id="loginPage" class="p-8 flex-grow flex flex-col justify-center space-y-5">
        <input type="text" id="loginID" placeholder="User ID" class="w-full p-4 rounded-2xl border text-center font-bold">
        <input type="password" id="loginPass" placeholder="Password" class="w-full p-4 rounded-2xl border text-center font-bold">
        <button onclick="login()" class="w-full gradient-header text-white p-5 rounded-2xl font-bold">Login</button>
    </div>

    <!-- MAIN -->
    <div id="mainMenu" class="hidden p-6 flex-grow">

        <input id="staffInput" placeholder="Staff Name" class="w-full p-3 border mb-3">

        <button onclick="saveSlot()" class="w-full bg-green-600 text-white p-3 mb-3">
            SAVE DUTY
        </button>

        <input type="text" id="searchBar" placeholder="Search..." onkeyup="doSearch()" class="w-full p-3 border mb-2">
        <div id="searchBox"></div>

    </div>

    <!-- FOOTER -->
    <footer class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t p-3 text-center">
        <p class="text-blue-900 font-black text-[9px] tracking-[4px] opacity-40">
            JATIN SOLANKI BY VISION
        </p>
    </footer>

</div>

<script>

const firebaseConfig = { databaseURL: "https://jatin-9a897-default-rtdb.firebaseio.com/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref("hospital_v11_final");

let role="viewer", shift="Day", selectedDate="", currentEditKey="2026-01-01_OPD_1_Day", appData={};

window.onload = () => {
    const t = new Date().toISOString().split('T')[0];
    dateInput.value = t;
    fromDate.value = t;
    toDate.value = t;
    selectedDate = t;

    db.on('value',(s)=>{appData=s.val()||{};});
}

function login(){
    let id=loginID.value;
    let p=loginPass.value;

    if(id=="ssgd" && p=="9099020925") role="admin";
    else if(id=="ssgd") role="viewer";
    else return alert("Invalid Login");

    loginPage.style.display="none";
    mainMenu.style.display="block";
    dateArea.classList.remove('hidden');
}

function saveSlot(){

    let name = staffInput.value || "---";

    let from = fromDate.value || selectedDate;
    let to = toDate.value || selectedDate;

    let start = new Date(from);
    let end = new Date(to);

    if(start > end){
        alert("From Date wrong che");
        return;
    }

    let updates = {};

    if(from === to){
        let parts = currentEditKey.split('_');
        let key = `${from}_${parts[1]}_${parts[2]}_${shift}`;
        updates[key] = name;
    } else {
        while(start <= end){
            let d = start.toISOString().split('T')[0];
            let parts = currentEditKey.split('_');
            let key = `${d}_${parts[1]}_${parts[2]}_${shift}`;
            updates[key] = name;
            start.setDate(start.getDate() + 1);
        }
    }

    db.update(updates);
    alert("✅ Duty Saved");
}

function doSearch(){
    let q = searchBar.value.toLowerCase();
    let res = "";

    for(let k in appData){
        if(appData[k] && appData[k].toLowerCase().includes(q)){
            res += `<div>${k} → ${appData[k]}</div>`;
        }
    }

    searchBox.innerHTML = res || "Not found";
}

</script>

</body>
</html>
