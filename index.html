<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanskardham Hospital | Vision v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f0f2f5; }
        .gradient-header { background: linear-gradient(135deg, #075e54 0%, #128c7e 100%); }
        .btn-active:active { transform: scale(0.95); transition: 0.1s; }
        .main-card { transition: all 0.3s ease; border: 1px solid #e2e8f0; height: 110px; background: white; border-radius: 20px; }
        .notice-bubble { max-width: 85%; border-radius: 15px; position: relative; padding: 10px; margin-bottom: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .admin-msg { background-color: #dcf8c6; align-self: flex-start; border-top-left-radius: 0; }
        .time-stamp { font-size: 8px; color: #667781; text-align: right; margin-top: 4px; }
    </style>
</head>
<body>

<div class="max-w-md mx-auto min-h-screen flex flex-col bg-[#e5ddd5] relative shadow-2xl overflow-x-hidden">
    
    <header class="gradient-header text-white p-5 rounded-b-[30px] shadow-lg sticky top-0 z-50">
        <div class="flex justify-between items-center mb-1">
            <h1 class="text-xl font-black tracking-tighter uppercase">Sanskardham</h1>
            <div id="roleBadge" class="hidden bg-white/20 px-2 py-0.5 rounded-lg text-[9px] font-bold uppercase">Guest</div>
        </div>
        <div id="dateArea" class="hidden flex items-center bg-black/10 rounded-xl px-3 py-1.5 mt-2">
            <span class="text-xs mr-2">📅</span>
            <input type="date" id="dateInput" onchange="refreshAll()" class="bg-transparent text-white font-bold outline-none text-xs w-full">
            <button onclick="toggleShift()" id="shiftIco" class="ml-2 bg-white/20 px-2 py-1 rounded text-sm">☀️</button>
        </div>
    </header>

    <div id="loginPage" class="p-8 flex-grow flex flex-col justify-center space-y-4 bg-white">
        <div class="text-center mb-6">
            <span class="text-5xl">🏥</span>
            <h2 class="text-2xl font-black text-gray-800 mt-2">Staff Login</h2>
        </div>
        <input type="text" id="loginID" placeholder="User ID" class="w-full p-4 rounded-2xl bg-gray-50 border border-gray-200 outline-none text-center font-bold">
        <input type="password" id="loginPass" placeholder="Password" class="w-full p-4 rounded-2xl bg-gray-50 border border-gray-200 outline-none text-center font-bold">
        <button onclick="login()" class="w-full gradient-header text-white p-4 rounded-2xl font-bold btn-active uppercase">Login</button>
    </div>

    <div id="mainMenu" class="hidden p-5 space-y-4 flex-grow bg-white">
        <div class="grid grid-cols-2 gap-3">
            <div onclick="showDutySection()" class="main-card p-4 flex flex-col items-center justify-center btn-active cursor-pointer border-blue-100 border-2">
                <span class="text-3xl mb-1">📅</span>
                <span class="font-black text-slate-700 text-[10px] uppercase">Duty List</span>
            </div>
            <div onclick="showNoticeBoard()" class="main-card p-4 flex flex-col items-center justify-center btn-active cursor-pointer border-yellow-100 border-2">
                <span class="text-3xl mb-1">📢</span>
                <span class="font-black text-slate-700 text-[10px] uppercase">Notice Board</span>
            </div>
            <div onclick="showProfileSection()" class="main-card p-4 flex flex-col items-center justify-center btn-active cursor-pointer border-green-100 border-2">
                <span class="text-3xl mb-1">👤</span>
                <span class="font-black text-slate-700 text-[10px] uppercase">My Profile</span>
            </div>
        </div>
    </div>

    <div id="noticeSection" class="hidden flex flex-col flex-grow h-[80vh]">
        <div class="bg-white p-3 flex items-center border-b">
            <button onclick="backToMenu()" class="text-[#075e54] font-bold text-sm mr-4">⬅</button>
            <h2 class="font-bold text-gray-700">Notice Board (Admin Only)</h2>
        </div>

        <div id="noticeContainer" class="flex-grow p-4 overflow-y-auto flex flex-col bg-[#e5ddd5]">
            </div>

        <div id="adminInputArea" class="hidden p-3 bg-[#f0f0f0] flex items-center space-x-2 border-t">
            <button onclick="document.getElementById('noticeFile').click()" class="text-gray-500 text-xl">📎</button>
            <input type="file" id="noticeFile" class="hidden" accept="image/*,application/pdf">
            <input type="text" id="noticeMsg" placeholder="મેસેજ લખો..." class="flex-grow p-2 rounded-full border-none outline-none px-4 text-sm">
            <button onclick="postNotice()" class="bg-[#128c7e] text-white p-2 rounded-full w-10 h-10 flex items-center justify-center">➤</button>
        </div>
        <p id="fileName" class="text-[9px] bg-white px-4 text-gray-500 italic"></p>
    </div>

    <div id="dutySection" class="hidden p-5 space-y-4 bg-white flex-grow">
        <button onclick="backToMenu()" class="text-blue-600 font-bold text-[10px] uppercase">⬅ Back</button>
        <div class="relative">
            <input type="text" id="searchBar" onkeyup="doSearch()" placeholder="Search Staff Name..." class="w-full p-3.5 pl-10 rounded-2xl bg-gray-50 border border-gray-100 outline-none font-bold">
            <span class="absolute left-3.5 top-3.5">🔍</span>
        </div>
        <div id="deptGrid" class="grid grid-cols-2 gap-3"></div>
    </div>

    <div id="listPage" class="hidden p-5 bg-white flex-grow">
        <button onclick="backToDuty()" class="text-blue-600 font-bold text-[10px] mb-4 uppercase">⬅ Back</button>
        <div class="text-center mb-6">
            <h2 id="lTitle" class="text-2xl font-black text-gray-800"></h2>
            <p id="lSub" class="text-[10px] text-gray-400 font-bold"></p>
        </div>
        <div id="lBody" class="space-y-2"></div>
    </div>

    <div id="profileSection" class="hidden p-5 space-y-5 bg-white flex-grow">
        <button onclick="backToMenu()" class="text-blue-600 font-bold text-[10px] uppercase">⬅ Back</button>
        <div class="bg-blue-50 p-6 rounded-3xl">
            <input type="text" id="profName" placeholder="Full Name" class="w-full p-3 rounded-xl mb-3">
            <input type="text" id="profID" placeholder="Staff ID" class="w-full p-3 rounded-xl mb-3">
            <select id="profExp" class="w-full p-3 rounded-xl mb-3">
                <option value="OPD">OPD</option>
                <option value="EMERGENCY">EMERGENCY</option>
                <option value="ICU">ICU</option>
            </select>
            <button onclick="saveProfile()" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold">SAVE PROFILE</button>
        </div>
    </div>

    <div id="editModal" class="hidden fixed inset-0 bg-black/60 z-[200] flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white w-full rounded-[30px] p-6 shadow-2xl max-h-[90vh] overflow-y-auto">
            <h3 id="editDeptLabel" class="font-black mb-4 border-b"></h3>
            <div id="suggestionList" class="flex flex-wrap gap-2 mb-4"></div>
            <input type="text" id="staffInput" placeholder="Name..." class="w-full p-4 bg-gray-100 rounded-xl font-bold mb-4">
            <div class="grid grid-cols-2 gap-2 mb-4">
                <input type="date" id="bulkStart" class="p-2 border rounded">
                <input type="date" id="bulkEnd" class="p-2 border rounded">
            </div>
            <div class="flex space-x-2">
                <button onclick="closeEdit()" class="flex-1 p-3 bg-gray-200 rounded-xl font-bold">CANCEL</button>
                <button onclick="saveSlot()" class="flex-1 p-3 gradient-header text-white rounded-xl font-bold">SAVE</button>
            </div>
        </div>
    </div>

    <footer class="bg-white border-t p-2 flex justify-center sticky bottom-0">
        <p class="text-[8px] tracking-[3px] font-black opacity-40 uppercase">Jatin Solanki By Vision</p>
    </footer>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://jatin-9a897-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("hospital_v11_final");
    const profileDB = firebase.database().ref("hospital_staff_profiles");
    const noticeDB = firebase.database().ref("hospital_notices");

    let role = "viewer", shift = "Day", selectedDate = "", appData = {}, staffProfiles = {}, currentEditKey = "";

    window.onload = () => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('dateInput').value = today;
        document.getElementById('bulkStart').value = today;
        document.getElementById('bulkEnd').value = today;
        selectedDate = today;

        document.getElementById('noticeFile').onchange = function() {
            if(this.files[0]) document.getElementById('fileName').innerText = "📎 Selected: " + this.files[0].name;
        };
    };

    function login() {
        const id = document.getElementById('loginID').value.trim();
        const p = document.getElementById('loginPass').value;
        if(id === "ssgd" && p === "9099020925") role = "admin";
        else if(id === "ssgd" && p === "9712284024") role = "viewer";
        else return alert("Invalid ID/Pass");

        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('mainMenu').classList.remove('hidden');
        document.getElementById('roleBadge').classList.remove('hidden').innerText = role;
        
        if(role === "admin") document.getElementById('adminInputArea').classList.remove('hidden');
        
        startSync();
    }

    function startSync() {
        db.on('value', (s) => appData = s.val() || { "Depts": ["OPD", "EMERGENCY", "OFF LIST", "ORTHOPEDIC"] });
        profileDB.on('value', (s) => staffProfiles = s.val() || {});
        noticeDB.on('value', (s) => renderNotices(s.val()));
    }

    // --- NOTICE BOARD (ADMIN ONLY POSTING) ---
    function showNoticeBoard() {
        document.getElementById('mainMenu').classList.add('hidden');
        document.getElementById('noticeSection').classList.remove('hidden');
        const container = document.getElementById('noticeContainer');
        container.scrollTop = container.scrollHeight;
    }

    async function postNotice() {
        if(role !== "admin") return alert("માત્ર એડમિન જ પોસ્ટ કરી શકે!");

        const msg = document.getElementById('noticeMsg').value.trim();
        const fileInput = document.getElementById('noticeFile');
        let fileData = null, fileType = "";

        if(!msg && fileInput.files.length === 0) return;

        if(fileInput.files.length > 0) {
            const file = fileInput.files[0];
            fileType = file.type;
            if(file.size > 2 * 1024 * 1024) return alert("File too large (>2MB)");
            fileData = await convertBase64(file);
        }

        const notice = {
            message: msg,
            file: fileData,
            type: fileType,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
            date: new Date().toLocaleDateString('gu-IN')
        };

        noticeDB.push(notice).then(() => {
            document.getElementById('noticeMsg').value = "";
            document.getElementById('noticeFile').value = "";
            document.getElementById('fileName').innerText = "";
        });
    }

    function convertBase64(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
        });
    }

    function renderNotices(data) {
        const container = document.getElementById('noticeContainer');
        container.innerHTML = "";
        if(!data) return;

        Object.keys(data).forEach(key => {
            const n = data[key];
            let media = "";
            if(n.file) {
                if(n.type.includes('image')) media = `<img src="${n.file}" class="rounded-lg mb-2 max-h-60 w-full object-cover">`;
                else media = `<a href="${n.file}" download="file" class="block bg-black/5 p-2 rounded text-xs font-bold mb-2">📄 Download Document</a>`;
            }

            container.innerHTML += `
                <div class="notice-bubble admin-msg">
                    ${media}
                    <p class="text-sm font-medium">${n.message}</p>
                    <div class="time-stamp">${n.date} | ${n.time} ${role==='admin'?`<span onclick="deleteNotice('${key}')" class="ml-2 text-red-500">🗑️</span>`:''}</div>
                </div>
            `;
        });
        container.scrollTop = container.scrollHeight;
    }

    function deleteNotice(key) {
        if(confirm("Delete Notice?")) noticeDB.child(key).remove();
    }

    // --- PREVIOUS DUTY FUNCTIONS ---
    function showDutySection() {
        document.getElementById('mainMenu').classList.add('hidden');
        document.getElementById('dutySection').classList.remove('hidden');
        document.getElementById('dateArea').classList.remove('hidden');
        renderGrid();
    }
    function showProfileSection() {
        document.getElementById('mainMenu').classList.add('hidden');
        document.getElementById('profileSection').classList.remove('hidden');
    }
    function backToMenu() {
        document.querySelectorAll('#dutySection, #profileSection, #listPage, #dateArea, #noticeSection').forEach(e => e.classList.add('hidden'));
        document.getElementById('mainMenu').classList.remove('hidden');
    }
    function backToDuty() {
        document.getElementById('listPage').classList.add('hidden');
        document.getElementById('dutySection').classList.remove('hidden');
    }

    function renderGrid() {
        const grid = document.getElementById('deptGrid');
        grid.innerHTML = "";
        const ds = appData["Depts"] || ["OPD", "EMERGENCY", "OFF LIST", "ORTHOPEDIC"];
        ds.forEach(d => {
            grid.innerHTML += `<div onclick="openView('${d}')" class="p-4 bg-gray-50 rounded-2xl border border-gray-100 flex flex-col items-center btn-active">
                <span class="text-2xl mb-1">${d.includes('OFF')?'😴':'🏥'}</span>
                <span class="font-bold text-slate-700 text-[10px] uppercase">${d}</span>
            </div>`;
        });
    }

    function openView(d) {
        document.getElementById('dutySection').classList.add('hidden');
        document.getElementById('listPage').classList.remove('hidden');
        document.getElementById('lTitle').innerText = d;
        document.getElementById('lSub').innerText = `${shift} | ${selectedDate}`;
        let h = "";
        const limit = (d.toUpperCase() === 'OPD') ? 10 : 6;
        for(let i=1; i<=limit; i++) {
            let key = `${selectedDate}_${d}_${i}_${shift}`;
            let val = appData[key] || "---";
            h += `<div class="p-4 bg-gray-50 rounded-xl flex justify-between items-center border-l-4 border-teal-600">
                <span class="text-[9px] font-bold text-gray-400">SLOT ${i}</span>
                <span onclick="${role==='admin'?`openEdit('${key}','${d}','${i}')`:''}" class="${role==='admin'?'text-teal-700 font-bold underline':'font-bold'}">${val}</span>
            </div>`;
        }
        document.getElementById('lBody').innerHTML = h;
    }

    function openEdit(key, dept, idx) {
        currentEditKey = key;
        document.getElementById('editDeptLabel').innerText = `${dept} - Slot ${idx}`;
        document.getElementById('staffInput').value = (appData[key] === "---") ? "" : (appData[key] || "");
        const list = document.getElementById('suggestionList');
        list.innerHTML = "";
        Object.values(staffProfiles).forEach(p => {
            if(p.exp.toUpperCase() === dept.toUpperCase()) {
                list.innerHTML += `<div onclick="setStaff('${p.name}')" class="bg-teal-100 text-teal-700 px-3 py-1 rounded-full text-[10px] font-bold cursor-pointer">+ ${p.name}</div>`;
            }
        });
        document.getElementById('editModal').classList.remove('hidden');
    }

    function setStaff(name) { document.getElementById('staffInput').value = name; }
    function closeEdit() { document.getElementById('editModal').classList.add('hidden'); }

    async function saveSlot() {
        const staff = document.getElementById('staffInput').value.trim() || "---";
        const start = document.getElementById('bulkStart').value;
        const end = document.getElementById('bulkEnd').value;
        const dept = document.getElementById('lTitle').innerText;
        const idx = document.getElementById('editDeptLabel').innerText.split('Slot ')[1];

        let curr = new Date(start), last = new Date(end);
        while (curr <= last) {
            let dStr = curr.toISOString().split('T')[0];
            let bKey = `${dStr}_${dept}_${idx}_${shift}`;
            await db.child(bKey).set(staff);
            curr.setDate(curr.getDate() + 1);
        }
        closeEdit(); openView(dept);
    }

    function toggleShift() {
        shift = (shift === "Day") ? "Night" : "Day";
        document.getElementById('shiftIco').innerText = (shift === "Day") ? "☀️" : "🌙";
        if(!document.getElementById('listPage').classList.contains('hidden')) openView(document.getElementById('lTitle').innerText);
    }

    function refreshAll() {
        selectedDate = document.getElementById('dateInput').value;
        if(!document.getElementById('listPage').classList.contains('hidden')) openView(document.getElementById('lTitle').innerText);
    }

    function saveProfile() {
        const name = document.getElementById('profName').value.trim(), sid = document.getElementById('profID').value.trim(), exp = document.getElementById('profExp').value;
        if(!name || !sid) return alert("Fill all details");
        profileDB.child(sid).set({ name, exp }).then(() => { alert("Saved!"); backToMenu(); });
    }

    function doSearch() {
        const q = document.getElementById('searchBar').value.toLowerCase();
        if(!q) return;
        let found = "";
        for(let k in appData) {
            if(k.startsWith(selectedDate) && k.endsWith(shift) && appData[k].toLowerCase().includes(q)) {
                found = k.split('_')[1]; break;
            }
        }
        alert(found ? `તમારી ડ્યુટી ${found} માં છે.` : "સ્ટાફ મળ્યો નથી.");
    }
</script>
</body>
</html>
