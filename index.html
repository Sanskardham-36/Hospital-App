<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanskardham Hospital | Vision</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f1f5f9; }
        .gradient-header { background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%); }
        .btn-active:active { transform: scale(0.95); }
        /* Auto-complete suggestions style */
        .suggestion-box { position: absolute; background: white; width: 100%; z-index: 100; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-height: 150px; overflow-y: auto; }
        .suggestion-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 14px; }
        .suggestion-item:hover { background: #f0f7ff; color: #2563eb; }
    </style>
</head>
<body>

<div class="max-w-md mx-auto min-h-screen flex flex-col bg-white relative shadow-2xl">
    
    <header class="gradient-header text-white p-6 rounded-b-[40px] shadow-lg sticky top-0 z-50">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h1 class="text-2xl font-black tracking-tighter uppercase leading-none">Sanskardham</h1>
                <p id="userLabel" class="text-[10px] font-bold text-blue-200 uppercase mt-1">Vision v2.0</p>
            </div>
            <div class="flex space-x-2">
                <button onclick="toggleShift()" id="shiftIco" class="bg-white/20 p-2 rounded-2xl text-xl">☀️</button>
                <div id="roleLabel" class="bg-white/20 px-3 py-1 rounded-xl text-[10px] font-bold self-center uppercase tracking-widest">Guest</div>
            </div>
        </div>
        <div id="dateArea" class="hidden flex items-center bg-black/10 rounded-2xl px-4 py-2 mt-2">
            <span class="text-xs mr-2">📅</span>
            <input type="date" id="dateInput" onchange="refreshAll()" class="bg-transparent text-white font-bold outline-none text-sm w-full">
        </div>
    </header>

    <div id="loginPage" class="p-8 flex-grow flex flex-col justify-center space-y-5">
        <div class="text-center mb-5">
            <span class="text-5xl">🏥</span>
            <h2 class="text-2xl font-black text-gray-800 mt-3 tracking-tight">Staff Portal</h2>
        </div>
        <input type="text" id="loginID" placeholder="User ID (ssgd)" class="w-full p-4 rounded-2xl bg-gray-50 border border-gray-200 outline-none focus:ring-2 focus:ring-blue-600">
        <input type="password" id="loginPass" placeholder="Password" class="w-full p-4 rounded-2xl bg-gray-50 border border-gray-200 outline-none focus:ring-2 focus:ring-blue-600">
        <button onclick="login()" class="w-full gradient-header text-white p-5 rounded-2xl font-bold shadow-xl btn-active uppercase tracking-widest">Login</button>
    </div>

    <div id="homePage" class="hidden p-5 space-y-6 flex-grow">
        <div class="relative">
            <input type="text" id="searchBar" onkeyup="doSearch()" placeholder="તમારી ડ્યુટી શોધો..." class="w-full p-4 pl-12 rounded-2xl bg-white shadow-sm border border-gray-100 outline-none focus:ring-2 focus:ring-blue-500 font-bold">
            <span class="absolute left-4 top-4 text-xl">🔍</span>
        </div>
        <div id="searchBox" class="hidden p-5 rounded-3xl border-2 font-bold text-center"></div>

        <button id="pdfBtn" onclick="generatePDF()" class="hidden w-full bg-green-600 text-white p-4 rounded-2xl font-bold text-sm shadow-lg btn-active">
            📥 આજની ડ્યુટી PDF ડાઉનલોડ કરો
        </button>

        <div class="flex justify-between items-center px-1">
            <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Departments</h3>
            <button id="addDeptBtn" onclick="addNewDept()" class="hidden text-blue-600 font-bold text-[10px] uppercase">+ Add Dept</button>
        </div>
        <div id="deptGrid" class="grid grid-cols-2 gap-4 pb-20"></div>
    </div>

    <div id="listPage" class="hidden p-5 flex-grow">
        <button onclick="goHome()" class="text-blue-600 font-bold text-xs mb-6 flex items-center">⬅ BACK TO HOME</button>
        <div class="text-center mb-8">
            <h2 id="lTitle" class="text-2xl font-black text-gray-800 uppercase italic"></h2>
            <p id="lSub" class="text-[10px] font-bold text-gray-400 uppercase tracking-[3px]"></p>
        </div>
        <div id="lBody" class="space-y-4 pb-20"></div>
    </div>

    <div id="editModal" class="hidden fixed inset-0 bg-black/50 z-[200] flex items-center justify-center p-6">
        <div class="bg-white w-full rounded-[30px] p-6 relative">
            <h3 class="font-black text-gray-800 mb-4">Edit Slot</h3>
            <div class="relative">
                <input type="text" id="staffInput" placeholder="સ્ટાફનું નામ લખો..." class="w-full p-4 bg-gray-100 rounded-xl outline-none border-2 border-transparent focus:border-blue-500" onkeyup="showSuggestions(this.value)">
                <div id="suggestionBox" class="suggestion-box hidden"></div>
            </div>
            <div class="flex space-x-3 mt-6">
                <button onclick="closeEdit()" class="flex-1 p-4 bg-gray-200 rounded-xl font-bold text-gray-600">Cancel</button>
                <button onclick="saveSlot()" class="flex-1 p-4 gradient-header text-white rounded-xl font-bold">Save</button>
            </div>
        </div>
    </div>

    <footer class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/80 backdrop-blur-md border-t p-4 flex justify-center z-50">
        <p class="text-blue-900 font-black text-[9px] tracking-[4px]">JATIN SOLANKI BY VISION</p>
    </footer>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://jatin-9a897-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("hospital_v11_final");

    let role = "viewer", shift = "Day", selectedDate = "", appData = {}, currentEditKey = "";
    
    // સ્ટાફનું લિસ્ટ (Auto-suggest માટે)
    const staffList = ["Jatin Solanki", "Hitesh Bhai", "Mehul", "Suresh Kumar", "Pankaj", "Ramesh", "Deepak", "Sunil", "Ankit", "Priya", "Nisha"];

    window.onload = () => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('dateInput').value = today;
        selectedDate = today;
    };

    function login() {
        const id = document.getElementById('loginID').value.trim();
        const p = document.getElementById('loginPass').value;

        if(id === "ssgd" && p === "9099020925") role = "admin";
        else if(id === "ssgd" && p === "9712284024") role = "viewer";
        else return alert("Wrong Credentials!");

        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('homePage').classList.remove('hidden');
        document.getElementById('dateArea').classList.remove('hidden');
        document.getElementById('roleLabel').innerText = role;
        
        if(role === 'admin') {
            document.getElementById('addDeptBtn').classList.remove('hidden');
            document.getElementById('pdfBtn').classList.remove('hidden');
        }
        startSync();
    }

    function startSync() {
        db.on('value', (s) => {
            appData = s.val() || { "Depts": ["OPD", "OFF List"] };
            renderGrid();
        });
    }

    function renderGrid() {
        const grid = document.getElementById('deptGrid');
        grid.innerHTML = "";
        const ds = appData["Depts"] || ["OPD", "OFF List"];
        ds.forEach(d => {
            grid.innerHTML += `<div onclick="openView('${d}')" class="p-6 bg-white rounded-[30px] border border-gray-100 shadow-sm flex flex-col items-center btn-active">
                <span class="text-3xl mb-3">${d==='OFF List'?'😴':'🏥'}</span>
                <span class="font-bold text-gray-700 text-[10px] uppercase">${d}</span>
            </div>`;
        });
    }

    function openView(d) {
        document.getElementById('homePage').classList.add('hidden');
        document.getElementById('listPage').classList.remove('hidden');
        document.getElementById('lTitle').innerText = d;
        document.getElementById('lSub').innerText = `${shift} | ${selectedDate}`;
        
        let h = "";
        for(let i=1; i<=6; i++) {
            let key = `${selectedDate}_${d}_${i}_${shift}`;
            let val = appData[key] || "---";
            h += `<div class="p-4 bg-gray-50 rounded-2xl flex justify-between items-center border-l-4 border-blue-600">
                <span class="text-[9px] font-bold text-gray-400 uppercase">Slot ${i}</span>
                <span onclick="${role==='admin'?`openEdit('${key}')`:''}" class="${role==='admin'?'text-blue-600 font-bold underline':'font-bold'}">${val}</span>
            </div>`;
        }
        document.getElementById('lBody').innerHTML = h;
    }

    // Auto-suggest Logic
    function showSuggestions(val) {
        const box = document.getElementById('suggestionBox');
        if(!val) { box.classList.add('hidden'); return; }
        const filtered = staffList.filter(s => s.toLowerCase().includes(val.toLowerCase()));
        if(filtered.length > 0) {
            box.innerHTML = filtered.map(s => `<div class="suggestion-item" onclick="selectStaff('${s}')">${s}</div>`).join('');
            box.classList.remove('hidden');
        } else {
            box.classList.add('hidden');
        }
    }

    function selectStaff(name) {
        document.getElementById('staffInput').value = name;
        document.getElementById('suggestionBox').classList.add('hidden');
    }

    function openEdit(key) {
        currentEditKey = key;
        document.getElementById('staffInput').value = appData[key] || "";
        document.getElementById('editModal').classList.remove('hidden');
    }

    function closeEdit() { document.getElementById('editModal').classList.add('hidden'); }

    function saveSlot() {
        const val = document.getElementById('staffInput').value.trim();
        db.update({ [currentEditKey]: val || "---" });
        closeEdit();
        openView(currentEditKey.split('_')[1]);
    }

    // PDF Generation
    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFontSize(18);
        doc.text("SANSKAR DHAM HOSPITAL - DUTY CHART", 14, 20);
        doc.setFontSize(11);
        doc.text(`DATE: ${selectedDate} | SHIFT: ${shift}`, 14, 30);

        const rows = [];
        const ds = appData["Depts"] || [];
        
        ds.forEach(d => {
            for(let i=1; i<=6; i++) {
                let val = appData[`${selectedDate}_${d}_${i}_${shift}`];
                if(val && val !== "---") {
                    rows.push([d, `Slot ${i}`, val]);
                }
            }
        });

        doc.autoTable({
            startY: 40,
            head: [['Department', 'Slot', 'Staff Name']],
            body: rows,
            theme: 'grid',
            headStyles: { fillColor: [30, 58, 138] }
        });

        doc.save(`Duty_Report_${selectedDate}.pdf`);
    }

    function toggleShift() {
        shift = (shift === "Day") ? "Night" : "Day";
        document.getElementById('shiftIco').innerText = (shift === "Day") ? "☀️" : "🌙";
        renderGrid();
    }

    function refreshAll() {
        selectedDate = document.getElementById('dateInput').value;
        renderGrid();
    }

    function goHome() { 
        document.getElementById('homePage').classList.remove('hidden'); 
        document.getElementById('listPage').classList.add('hidden'); 
    }

    function doSearch() {
        const q = document.getElementById('searchBar').value.toLowerCase();
        const res = document.getElementById('searchBox');
        if(!q) { res.classList.add('hidden'); return; }
        let found = "";
        for(let k in appData) {
            if(k.startsWith(selectedDate) && k.endsWith(shift) && appData[k].toLowerCase().includes(q)) {
                found = k.split('_')[1]; break;
            }
        }
        res.classList.remove('hidden');
        if(found) {
            res.innerHTML = found === "OFF List" ? "😴 આજે તમારી રજા (OFF) છે." : `✅ તમારી ડ્યુટી ${found} માં છે.`;
            res.className = "p-5 rounded-3xl border-2 bg-green-50 border-green-200 text-green-700 font-bold text-center";
        } else {
            res.innerHTML = "⚠️ નામ લિસ્ટમાં નથી.";
            res.className = "p-5 rounded-3xl border-2 bg-red-50 border-red-200 text-red-700 font-bold text-center";
        }
    }
</script>
</body>
</html>
